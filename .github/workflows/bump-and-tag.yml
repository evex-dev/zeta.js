name: Bump and Tag

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Operation
        required: true
        type: choice
        options:
          - create-pr
          - tag
      bump:
        description: Version bump for create-pr mode
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    if: inputs.mode == 'create-pr'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump package version
        id: bump
        run: |
          VERSION="$(bun packages/zeta.js/scripts/bump-version.ts "${{ inputs.bump }}")"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Update lockfile
        run: bun install

      - name: Ensure tag does not exist
        run: |
          TAG="v${{ steps.bump.outputs.version }}"
          if git rev-parse "${TAG}" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
            exit 1
          fi

      - name: Ensure release branch does not exist
        run: |
          BRANCH="release/v${{ steps.bump.outputs.version }}"
          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists."
            exit 1
          fi

      - name: Check public API types
        working-directory: packages/zeta.js
        run: bun run fix:slow-types

      - name: Typecheck package
        run: bun x tsc -p packages/zeta.js/tsconfig.json --noEmit

      - name: Test package
        run: bun test packages/zeta.js

      - name: JSR dry run
        working-directory: packages/zeta.js
        run: bunx jsr publish --dry-run --allow-dirty

      - name: Create release branch and commit
        id: commit
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          TAG="v${VERSION}"
          BRANCH="release/${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "${BRANCH}"
          git add bun.lock packages/zeta.js/package.json packages/zeta.js/jsr.json packages/zeta.js/src packages/zeta.js/index.ts
          git diff --cached --quiet && {
            echo "No release changes to commit."
            exit 1
          }
          git commit -m "chore: release @evex/zeta ${TAG}"
          git push origin "${BRANCH}"
          echo "branch=${BRANCH}" >> "${GITHUB_OUTPUT}"

      - name: Create release pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.bump.outputs.version }}"
          gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "${{ steps.commit.outputs.branch }}" \
            --title "chore: release @evex/zeta ${TAG}" \
            --body "Release @evex/zeta ${TAG}.\n\nAfter merging this PR, run Bump and Tag with mode=tag on main, then run Release from the ${TAG} tag ref as a JSR scope member."

  tag-release:
    if: inputs.mode == 'tag'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Read package version
        id: version
        run: |
          VERSION="$(bun -e 'const pkg = await Bun.file("packages/zeta.js/package.json").json(); const jsr = await Bun.file("packages/zeta.js/jsr.json").json(); if (pkg.version !== jsr.version) throw new Error(`Version mismatch: package.json=${pkg.version}, jsr.json=${jsr.version}`); console.log(pkg.version)')"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Ensure tag does not exist
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "${TAG}" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
            exit 1
          fi

      - name: Create release tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "refs/tags/${TAG}"
          echo "Created ${TAG}. Run the Release workflow from this tag ref as a JSR scope member."
