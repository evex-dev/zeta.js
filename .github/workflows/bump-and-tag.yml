name: Bump and Tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Validate branch ref
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "branch" ]]; then
            echo "Bump and Tag must run from a branch ref, not ${GITHUB_REF}."
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump package version
        id: bump
        run: |
          VERSION="$(bun packages/zeta.js/scripts/bump-version.ts "${{ inputs.bump }}")"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Update lockfile
        run: bun install

      - name: Ensure tag does not exist
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          if git rev-parse "${TAG}" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
            exit 1
          fi

      - name: Check public API types
        working-directory: packages/zeta.js
        run: bun run fix:slow-types

      - name: Typecheck package
        run: bun x tsc -p packages/zeta.js/tsconfig.json --noEmit

      - name: Test package
        run: bun test packages/zeta.js

      - name: JSR dry run
        working-directory: packages/zeta.js
        run: bunx jsr publish --dry-run --allow-dirty

      - name: Commit release changes
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock packages/zeta.js/package.json packages/zeta.js/jsr.json packages/zeta.js/src packages/zeta.js/index.ts
          git diff --cached --quiet && {
            echo "No release changes to commit."
            exit 1
          }
          git commit -m "chore: release @evex/zeta ${TAG}"

      - name: Create release tag
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          git tag "${TAG}"

      - name: Push commit and tag
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "refs/tags/${TAG}"
          echo "Created ${TAG}. Run the Release workflow from this tag ref as a JSR scope member."
