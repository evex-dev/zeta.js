name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck package
        run: bun x tsc -p packages/zeta.js/tsconfig.json --noEmit

      - name: Test package
        run: bun test packages/zeta.js

      - name: JSR dry run
        working-directory: packages/zeta.js
        run: bunx jsr publish --dry-run --allow-slow-types
