name: Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write # Required by JSR for OIDC publishing and provenance.

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck package
        run: bun x tsc -p packages/zeta.js/tsconfig.json --noEmit

      - name: Test package
        run: bun test packages/zeta.js

      - name: Prepare release tag
        id: release
        run: |
          VERSION="$(bun -e 'const config = await Bun.file("packages/zeta.js/jsr.json").json(); console.log(config.version)')"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" != "${TAG}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package version ${VERSION}."
              exit 1
            fi
            echo "publish=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Skipping publish."
            echo "publish=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "refs/tags/${TAG}"
          echo "publish=true" >> "${GITHUB_OUTPUT}"

      - name: Publish to JSR
        if: steps.release.outputs.publish == 'true'
        working-directory: packages/zeta.js
        run: bunx jsr publish
