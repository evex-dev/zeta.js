name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write # Required by JSR for OIDC publishing and provenance.

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Validate tag ref
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Release must run from a v*.*.* tag ref, not ${GITHUB_REF}."
            exit 1
          fi

          VERSION="$(bun -e 'const config = await Bun.file("packages/zeta.js/jsr.json").json(); console.log(config.version)')"
          TAG="v${VERSION}"
          if [[ "${GITHUB_REF_NAME}" != "${TAG}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${VERSION}."
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck package
        run: bun x tsc -p packages/zeta.js/tsconfig.json --noEmit

      - name: Test package
        run: bun test packages/zeta.js

      - name: Publish to JSR
        working-directory: packages/zeta.js
        run: bunx jsr publish
